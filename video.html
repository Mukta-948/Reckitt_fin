<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reckitt Video</title>

    <link rel="stylesheet" href="css/video.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="video-card">

        <img src="assets/logo.png" alt="Reckitt Logo" class="logo">

        <div class="video-wrapper">
           <video id="trainingVideo" class="training-video" controls controlsList="nodownload">
    <source src="assets/video.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>
        </div>

        <button id="continueBtn" class="continue-btn" disabled>
            Continue
        </button>

        <img src="assets/watermark.png" alt="" class="watermark">

    </div>

    <script>
const video = document.getElementById("trainingVideo");
const continueBtn = document.getElementById("continueBtn");

let lastTime = 0;

// Prevent skipping
video.addEventListener("timeupdate", () => {
    if (!video.seeking) {
        lastTime = video.currentTime;
    }
});

video.addEventListener("seeking", () => {

    // Allow only tiny differences caused by buffering
    if (Math.abs(video.currentTime - lastTime) > 0.1) {
        video.currentTime = lastTime;
    }
});

// Enable Continue only after video ends
video.addEventListener("ended", () => {
    continueBtn.disabled = false;
    continueBtn.classList.add("enabled");
});

continueBtn.addEventListener("click", () => {
    window.location.href = "q1.html";
});
</script>

</body>
</html>
