<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assessment - Question 3</title>

<link rel="stylesheet" href="css/assessment.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="assessment-card">

<img src="assets/logo.png" class="logo" alt="Reckitt Logo">

<h1 class="title">Assessment</h1>

<div class="progress-section">
    <div class="progress-bar">
        <div class="progress-fill" style="width:60%;"></div>
    </div>
    <span class="progress-text">3/5</span>
</div>

<div class="question-box">
    What should you do before operating machinery?
</div>

<div class="options-grid">

<button class="option" data-correct="false">
    <span class="option-text">Start immediately</span>
</button>

<button class="option" data-correct="true">
    <span class="option-text">Read safety instructions</span>
</button>

<button class="option" data-correct="false">
    <span class="option-text">Ignore warnings</span>
</button>

<button class="option" data-correct="false">
    <span class="option-text">Remove guards</span>
</button>

</div>

<div class="button-row">

<button class="prev-btn" onclick="location.href='q2.html'">
    Previous
</button>

<button class="next-btn" id="nextBtn" disabled>
    Next
</button>

</div>

<img src="assets/watermark.png" class="watermark" alt="">

</div>

<script>
const options = document.querySelectorAll(".option");
const nextBtn = document.getElementById("nextBtn");

let attempts = 0;
let answered = false;

options.forEach(option => {

    option.addEventListener("click", () => {

        if (answered) return;

        const isCorrect = option.dataset.correct === "true";

        attempts++;

        // CORRECT ANSWER
        if (isCorrect) {

            option.classList.add("correct");

            // Give point only if correct on first attempt
            if (attempts === 1) {
                localStorage.setItem("q3Score", "1");
            } else {
                localStorage.setItem("q3Score", "0");
            }

            answered = true;
            nextBtn.disabled = false;
        }

        // WRONG ANSWER
        else {

            option.classList.add("wrong");

            // First wrong attempt
            if (attempts === 1) {

                // Remove red mark after a short delay
                setTimeout(() => {
                    option.classList.remove("wrong");
                }, 800);

            }

            // Second wrong attempt
            else {

                // Show correct answer
                options.forEach(opt => {
                    if (opt.dataset.correct === "true") {
                        opt.classList.add("correct");
                    }
                });

                localStorage.setItem("q3Score", "0");

                answered = true;
                nextBtn.disabled = false;
            }
        }

    });

});

nextBtn.addEventListener("click", () => {
    window.location.href = "q4.html";
});
</script>

</body>
</html>
